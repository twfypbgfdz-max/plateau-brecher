<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Router v0.2 Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --soft: #f9fafc;
      --text: #1d232b;
      --muted: #657080;
      --line: #d9dee7;
      --accent: #1769aa;
      --accent-dark: #0f4f82;
      --good: #1d7f4f;
      --mid: #a96800;
      --high: #b42318;
      --shadow: 0 10px 28px rgba(22, 34, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .app,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .app {
      padding: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    select {
      min-height: 44px;
      margin-bottom: 16px;
    }

    textarea:focus,
    select:focus,
    button:focus {
      outline: 3px solid rgba(23, 105, 170, 0.24);
      outline-offset: 2px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      margin-top: 12px;
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .result {
      display: none;
      margin-top: 20px;
      gap: 12px;
    }

    .result.is-visible {
      display: grid;
    }

    .card {
      padding: 14px;
      box-shadow: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .metric-title {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .ranking {
      display: grid;
      gap: 10px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .rank-pos {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #e8f1f9;
      color: var(--accent-dark);
      font-weight: 700;
    }

    .rank-name {
      margin: 0 0 4px;
      font-weight: 700;
    }

    .rank-reason {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .rank-score {
      font-weight: 700;
      white-space: nowrap;
    }

    .criteria-list {
      margin: 0;
      padding-left: 20px;
    }

    .criteria-list li {
      margin: 6px 0;
    }

    .workflow {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .prompt-box {
      width: 100%;
      min-height: 170px;
      margin-top: 8px;
      background: var(--soft);
    }

    .copy-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .copy-state {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .risk-low {
      color: var(--good);
    }

    .risk-mid {
      color: var(--mid);
    }

    .risk-high {
      color: var(--high);
    }

    @media (max-width: 640px) {
      main {
        padding: 12px;
      }

      .app {
        padding: 16px;
      }

      .summary-grid,
      .rank-item {
        grid-template-columns: 1fr;
      }

      .rank-score {
        white-space: normal;
      }

      .primary,
      .copy-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-labelledby="app-title">
      <h1 id="app-title">AI Router</h1>
      <p class="subtitle">Lokale Test-App v0.2 mit Ranking, Projektmodus und Workflow-Vorschlag.</p>

      <label for="projectMode">Projektmodus</label>
      <select id="projectMode">
        <option value="general">Allgemein</option>
        <option value="plateau">Plateau-Brecher</option>
        <option value="calories">Kalorien-App</option>
        <option value="social">Social-Media-App</option>
      </select>

      <label for="taskInput">Was willst du machen?</label>
      <textarea id="taskInput" placeholder="Beispiel: Ich habe einen CSS Fehler in einer HTML Datei und brauche einen kleinen Fix."></textarea>

      <button class="primary" id="recommendButton" type="button">KI empfehlen</button>

      <section class="result" id="result" aria-live="polite">
        <div class="summary-grid">
          <div class="metric">
            <p class="metric-title">Beste Empfehlung</p>
            <p class="metric-value" id="topAi">-</p>
          </div>
          <div class="metric">
            <p class="metric-title">Vertrauenswert</p>
            <p class="metric-value" id="confidence">-</p>
          </div>
          <div class="metric">
            <p class="metric-title">Risikostufe</p>
            <p class="metric-value" id="riskLevel">-</p>
          </div>
          <div class="metric">
            <p class="metric-title">Projektmodus</p>
            <p class="metric-value" id="modeLabel">-</p>
          </div>
        </div>

        <div class="card">
          <h2>Top 3 Empfehlungen</h2>
          <div class="ranking" id="rankingList"></div>
        </div>

        <div class="card">
          <h2>Detaillierte Begruendung</h2>
          <ul class="criteria-list" id="criteriaList"></ul>
        </div>

        <div class="card">
          <h2>Workflow-Vorschlag</h2>
          <p class="workflow" id="workflow">-</p>
        </div>

        <div class="card">
          <label for="promptOutput">Fertiger Prompt zum Kopieren</label>
          <textarea class="prompt-box" id="promptOutput" readonly></textarea>
          <div class="copy-row">
            <button class="secondary" id="copyButton" type="button">Prompt kopieren</button>
            <span class="copy-state" id="copyState"></span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const taskInput = document.getElementById("taskInput");
    const projectMode = document.getElementById("projectMode");
    const recommendButton = document.getElementById("recommendButton");
    const result = document.getElementById("result");
    const topAi = document.getElementById("topAi");
    const confidence = document.getElementById("confidence");
    const riskLevel = document.getElementById("riskLevel");
    const modeLabel = document.getElementById("modeLabel");
    const rankingList = document.getElementById("rankingList");
    const criteriaList = document.getElementById("criteriaList");
    const workflow = document.getElementById("workflow");
    const promptOutput = document.getElementById("promptOutput");
    const copyButton = document.getElementById("copyButton");
    const copyState = document.getElementById("copyState");

    const modeLabels = {
      general: "Allgemein",
      plateau: "Plateau-Brecher",
      calories: "Kalorien-App",
      social: "Social-Media-App"
    };

    const aiProfiles = {
      Codex: {
        base: 8,
        reason: "Stark fuer Code, Repo-Arbeit und gezielte Dateiaenderungen."
      },
      Claude: {
        base: 8,
        reason: "Stark fuer Konzept, UX, Architektur und groessere Planungen."
      },
      ChatGPT: {
        base: 8,
        reason: "Stark fuer Erklaerungen, Textarbeit, Entscheidungen und Prompts."
      },
      Gemini: {
        base: 8,
        reason: "Stark als Startpunkt fuer Recherche, aktuelle Infos und Vergleiche."
      }
    };

    const keywordRules = [
      { label: "Code/Repo", ai: "Codex", weight: 24, terms: ["bug", "fehler", "css", "html", "js", "javascript", "git", "commit", "repo", "datei aendern", "datei ändern"] },
      { label: "Konzept/Architektur", ai: "Claude", weight: 24, terms: ["konzept", "architektur", "ux", "grosses feature", "großes feature", "refactor-plan", "refactor plan"] },
      { label: "Text/Erklaerung", ai: "ChatGPT", weight: 22, terms: ["erklaerung", "erklärung", "text", "entscheidung", "prompt", "einschaetzung", "einschätzung"] },
      { label: "Recherche/Aktualitaet", ai: "Gemini", weight: 24, terms: ["recherche", "aktuelle informationen", "aktuelle infos", "vergleich", "vergleiche", "online"] },
      { label: "Recherche als Textauswertung", ai: "ChatGPT", weight: 12, terms: ["recherche", "aktuelle informationen", "aktuelle infos", "vergleich", "vergleiche", "online"] }
    ];

    const modeBoosts = {
      general: [],
      plateau: [
        { label: "Plateau-Brecher: vorsichtige Code- und Datenlogik", ai: "Codex", weight: 8 },
        { label: "Plateau-Brecher: Analyse und Trainingsentscheidung", ai: "ChatGPT", weight: 6 }
      ],
      calories: [
        { label: "Kalorien-App: App-Logik und UI-Dateien", ai: "Codex", weight: 8 },
        { label: "Kalorien-App: klare Nutzertexte und Entscheidungshilfe", ai: "ChatGPT", weight: 5 }
      ],
      social: [
        { label: "Social-Media-App: UX und Inhaltskonzept", ai: "Claude", weight: 8 },
        { label: "Social-Media-App: Text, Caption und Prompt", ai: "ChatGPT", weight: 7 }
      ]
    };

    function normalizeText(value) {
      return value.trim().toLowerCase();
    }

    function addScore(scores, criteria, ai, points, label) {
      scores[ai] += points;
      criteria.push(label + " -> " + ai + " +" + points);
    }

    function calculateRecommendation(task, mode) {
      const normalizedTask = normalizeText(task);
      const scores = {};
      const criteria = [];
      let signalCount = 0;

      Object.keys(aiProfiles).forEach((ai) => {
        scores[ai] = aiProfiles[ai].base;
      });

      keywordRules.forEach((rule) => {
        const matches = rule.terms.filter((term) => normalizedTask.includes(term));
        if (matches.length > 0) {
          const points = rule.weight + Math.min((matches.length - 1) * 4, 12);
          signalCount += matches.length;
          addScore(scores, criteria, rule.ai, points, rule.label + ": " + matches.join(", "));
        }
      });

      modeBoosts[mode].forEach((boost) => {
        signalCount += 1;
        addScore(scores, criteria, boost.ai, boost.weight, boost.label);
      });

      if (!normalizedTask) {
        signalCount += 1;
        addScore(scores, criteria, "ChatGPT", 18, "Leere Aufgabe: zuerst Aufgabe klaeren");
      }

      if (criteria.length === 0) {
        signalCount += 1;
        addScore(scores, criteria, "ChatGPT", 14, "Fallback: keine eindeutigen Kriterien erkannt");
        addScore(scores, criteria, "Claude", 8, "Fallback: Strukturierung kann helfen");
      }

      const total = Object.values(scores).reduce((sum, score) => sum + score, 0);
      const ranking = Object.keys(scores)
        .map((ai) => ({
          ai,
          score: scores[ai],
          percent: Math.round((scores[ai] / total) * 100),
          reason: aiProfiles[ai].reason
        }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

      const confidenceValue = Math.min(100, Math.round(35 + signalCount * 8 + (ranking[0].score - ranking[1].score)));

      return {
        ranking,
        criteria,
        confidence: confidenceValue,
        risk: getRisk(confidenceValue, signalCount, ranking[0].ai),
        workflow: ranking.map((item) => item.ai).join(" -> ")
      };
    }

    function getRisk(confidenceValue, signalCount, topName) {
      if (topName === "Gemini" || confidenceValue < 55 || signalCount < 2) {
        return { label: "hoch", className: "risk-high" };
      }

      if (confidenceValue < 75) {
        return { label: "mittel", className: "risk-mid" };
      }

      return { label: "niedrig", className: "risk-low" };
    }

    function buildPrompt(task, mode, recommendation) {
      const cleanTask = task.trim() || "Hilf mir, meine Aufgabe genauer zu formulieren.";
      const top = recommendation.ranking[0];

      return [
        "Projektmodus: " + modeLabels[mode],
        "Empfohlene KI: " + top.ai,
        "Workflow: " + recommendation.workflow,
        "Vertrauenswert: " + recommendation.confidence + "%",
        "",
        "Aufgabe:",
        cleanTask,
        "",
        "Bitte liefere:",
        "- eine kurze Einschaetzung",
        "- konkrete naechste Schritte",
        "- Risiken oder offene Fragen",
        "- eine knappe, umsetzbare Antwort"
      ].join("\n");
    }

    function renderRanking(ranking) {
      rankingList.innerHTML = "";

      ranking.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "rank-item";
        row.innerHTML = [
          "<span class=\"rank-pos\">" + (index + 1) + "</span>",
          "<div><p class=\"rank-name\">" + item.ai + "</p><p class=\"rank-reason\">" + item.reason + "</p></div>",
          "<span class=\"rank-score\">" + item.percent + "%</span>"
        ].join("");
        rankingList.appendChild(row);
      });
    }

    function renderCriteria(criteria) {
      criteriaList.innerHTML = "";

      criteria.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        criteriaList.appendChild(li);
      });
    }

    function renderRecommendation() {
      const task = taskInput.value;
      const mode = projectMode.value;
      const recommendation = calculateRecommendation(task, mode);

      topAi.textContent = recommendation.ranking[0].ai;
      confidence.textContent = recommendation.confidence + "%";
      riskLevel.textContent = recommendation.risk.label;
      riskLevel.className = "metric-value " + recommendation.risk.className;
      modeLabel.textContent = modeLabels[mode];
      workflow.textContent = recommendation.workflow;
      promptOutput.value = buildPrompt(task, mode, recommendation);
      copyState.textContent = "";

      renderRanking(recommendation.ranking);
      renderCriteria(recommendation.criteria);
      result.classList.add("is-visible");
    }

    async function copyPrompt() {
      const prompt = promptOutput.value;

      if (!prompt) {
        copyState.textContent = "Noch kein Prompt vorhanden.";
        return;
      }

      try {
        await navigator.clipboard.writeText(prompt);
        copyState.textContent = "Prompt kopiert.";
      } catch (error) {
        promptOutput.focus();
        promptOutput.select();
        copyState.textContent = "Prompt ist markiert und kann kopiert werden.";
      }
    }

    recommendButton.addEventListener("click", renderRecommendation);
    copyButton.addEventListener("click", copyPrompt);
  </script>
</body>
</html>
